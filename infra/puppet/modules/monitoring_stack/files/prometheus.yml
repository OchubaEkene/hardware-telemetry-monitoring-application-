global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: hardware_agent
    static_configs:
      # Set AGENT_HOST to your hardware agent's LAN IP before deploying.
      # On EC2: provision.sh substitutes this automatically.
      # For local dev: export AGENT_HOST=192.168.x.x && envsubst < prometheus.yml | ...
      - targets: ["${AGENT_HOST}:9100"]
        labels:
          instance: home-pc
